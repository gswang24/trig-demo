<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三角函數演示</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📐</text></svg>">
    <style>
        body {
            font-family: "Microsoft JhengHei", -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f8f9fa;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            display: flex;
            gap: 20px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            flex-wrap: nowrap; 
            justify-content: center;
            align-items: flex-start; 
            width: 100%;
            max-width: 1100px;
            box-sizing: border-box;
        }
        .container > div:nth-child(1) {
            flex: 45; 
            min-width: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container > div:nth-child(2) {
            flex: 55; 
            min-width: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        canvas {
            border: 1px solid #eee;
            background-color: #ffffff;
            max-width: 100%; 
            height: auto;
            touch-action: none; 
        }
        .controls {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }
        .values {
            display: flex;
            flex-wrap: wrap; 
            justify-content: center;
            align-items: center;
            gap: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #valSin { color: #007AFF; }
        #valCos { color: #FF3B30; }
        #valTan { color: #AF52DE; }

        #valDegInput {
            color: #FF9500;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            background: transparent;
            width: 60px;
            text-align: right;
            font-family: inherit;
            padding: 0;
            margin: 0;
            outline: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        #valDegInput:hover {
            background-color: #FFF0D4;
            border-radius: 4px;
        }
        #valDegInput:focus {
            background-color: #FFF0D4;
            border-bottom: 2px dashed #FF9500;
            border-radius: 4px 4px 0 0;
            cursor: text;
        }
        #valDegInput::-webkit-outer-spin-button,
        #valDegInput::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #valDegInput[type=number] {
            -moz-appearance: textfield;
        }

        .buttons button {
            padding: 10px 24px;
            font-size: 1rem;
            cursor: pointer;
            border: 1px solid #ccc;
            border-radius: 8px;
            background: #fff;
            margin: 5px;
            transition: all 0.2s;
        }
        button.active-sin { background: #007AFF; color: white; border-color: #007AFF; }
        button.active-cos { background: #FF3B30; color: white; border-color: #FF3B30; }
        button.active-tan { background: #AF52DE; color: white; border-color: #AF52DE; }
    </style>
</head>
<body>

    <h2 style="color: #333; text-align: center;">三角函數：廣義角與週期同步演示</h2>

    <div class="container">
        <div>
            <canvas id="circleCanvas" width="450" height="450"></canvas>
            <p style="text-align:center; font-weight:bold;">廣義角視窗 (單位圓)</p>
        </div>
        <div>
            <canvas id="graphCanvas" width="550" height="450"></canvas>
            <p style="text-align:center; font-weight:bold;">週期視窗 (0 → 2π)</p>
        </div>
    </div>

    <div class="controls">
        <div class="values">
            <span>θ = <input type="number" id="valDegInput" min="0" max="360" step="0.1">°</span>
            <span>sin(θ) = <span id="valSin">0.000</span></span>
            <span>cos(θ) = <span id="valCos">0.000</span></span>
            <span>tan(θ) = <span id="valTan">0.000</span></span>
        </div>
        <div class="buttons">
            <button id="btnSin" class="active-sin" onclick="setMode('sin')">觀測 sin(θ)</button>
            <button id="btnCos" onclick="setMode('cos')">觀測 cos(θ)</button>
            <button id="btnTan" onclick="setMode('tan')">觀測 tan(θ)</button>
        </div>
    </div>

<script>
    const cCanvas = document.getElementById('circleCanvas');
    const gCanvas = document.getElementById('graphCanvas');
    const ctxC = cCanvas.getContext('2d');
    const ctxG = gCanvas.getContext('2d');
    const degInput = document.getElementById('valDegInput');

    let mathAngle = 0.5; 
    let mode = 'sin';
    let isDragging = false;

    const centerX = 225, centerY = 225, radius = 160;

    function getCoordinates(e) {
        if (e.touches && e.touches.length > 0) {
            return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        }
        return { x: e.clientX, y: e.clientY };
    }

    function updateAngle(e) {
        const coords = getCoordinates(e);
        const rect = cCanvas.getBoundingClientRect();
        
        const scaleX = cCanvas.width / rect.width;
        const scaleY = cCanvas.height / rect.height;

        const dx = (coords.x - rect.left) * scaleX - centerX;
        const dy = (coords.y - rect.top) * scaleY - centerY;
        
        mathAngle = Math.atan2(-dy, dx);
        if (mathAngle < 0) mathAngle += Math.PI * 2;
        draw();
    }

    function init() {
        cCanvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            updateAngle(e);
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (isDragging) updateAngle(e);
        });

        cCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            isDragging = true;
            updateAngle(e);
        }, { passive: false });
        
        window.addEventListener('touchend', () => isDragging = false);
        
        window.addEventListener('touchmove', (e) => {
            if (isDragging) {
                if (e.target === cCanvas) e.preventDefault(); 
                updateAngle(e);
            }
        }, { passive: false });

        degInput.addEventListener('focus', function() { this.select(); });
        degInput.addEventListener('click', function() { this.select(); });
        
        degInput.addEventListener('change', function() {
            let val = parseFloat(this.value);
            if (isNaN(val)) val = 0;
            
            val = ((val % 360) + 360) % 360; 
            if (val === 0 && parseFloat(this.value) === 360) val = 360;

            mathAngle = val * Math.PI / 180;
            draw();
        });

        degInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                this.blur(); 
            }
        });

        draw();
    }

    function setMode(m) {
        mode = m;
        document.querySelectorAll('.buttons button').forEach(b => b.className = '');
        document.getElementById('btn' + m.charAt(0).toUpperCase() + m.slice(1)).className = 'active-' + m;
        draw();
    }

    function draw() {
        ctxC.clearRect(0, 0, 450, 450);
        ctxG.clearRect(0, 0, 550, 450);
        const px = centerX + Math.cos(mathAngle) * radius;
        const py = centerY - Math.sin(mathAngle) * radius;
        drawUnitCircle(px, py);
        drawPeriodGraph();
        updateDisplayValues();
    }

    function drawUnitCircle(px, py) {
        ctxC.strokeStyle = '#eee';
        ctxC.lineWidth = 1;
        ctxC.beginPath();
        ctxC.moveTo(0, centerY); ctxC.lineTo(450, centerY);
        ctxC.moveTo(centerX, 0); ctxC.lineTo(centerX, 450);
        ctxC.stroke();

        ctxC.strokeStyle = '#333';
        ctxC.beginPath();
        ctxC.arc(centerX, centerY, radius, 0, Math.PI * 2);
        ctxC.stroke();

        // 畫角度的橘色弧線 (半徑 40)
        ctxC.strokeStyle = '#FF9500';
        ctxC.lineWidth = 2;
        ctxC.beginPath();
        ctxC.arc(centerX, centerY, 40, 0, -mathAngle, true);
        ctxC.stroke();

        // --- 更新：使用向量延伸法動態定位 θ 的文字 ---
        const currentDeg = (mathAngle * 180 / Math.PI).toFixed(1);
        const thetaText = "θ = " + currentDeg + "°";
        const midAngle = mathAngle / 2; // 算出角平分線
        const thetaDist = 50; // 定義錨點距離 (稍大於弧線半徑 40)
        
        const lx = centerX + Math.cos(midAngle) * thetaDist;
        const ly = centerY - Math.sin(midAngle) * thetaDist;
        
        ctxC.fillStyle = '#FF9500';
        ctxC.font = "bold 15px Arial";
        
        // 根據角平分線的方向，動態決定文字排版的對齊基準點 (與 P 點邏輯相同)
        if (Math.cos(midAngle) > 0.1) ctxC.textAlign = "left";
        else if (Math.cos(midAngle) < -0.1) ctxC.textAlign = "right";
        else ctxC.textAlign = "center";
        
        if (Math.sin(midAngle) > 0.1) ctxC.textBaseline = "bottom";
        else if (Math.sin(midAngle) < -0.1) ctxC.textBaseline = "top";
        else ctxC.textBaseline = "middle";
        
        ctxC.fillText(thetaText, lx, ly);
        // ---------------------------------------------

        ctxC.lineWidth = 3;
        ctxC.strokeStyle = '#FF3B30';
        ctxC.beginPath(); ctxC.moveTo(centerX, centerY); ctxC.lineTo(px, centerY); ctxC.stroke();
        ctxC.fillStyle = '#FF3B30';
        ctxC.font = "14px Microsoft JhengHei";
        ctxC.fillText("鄰邊", (centerX + px)/2, centerY + (py < centerY ? 20 : -10));

        ctxC.strokeStyle = '#007AFF';
        ctxC.beginPath(); ctxC.moveTo(px, centerY); ctxC.lineTo(px, py); ctxC.stroke();
        ctxC.fillStyle = '#007AFF';
        ctxC.textAlign = px > centerX ? "left" : "right";
        ctxC.fillText("對邊", px + (px > centerX ? 8 : -8), (centerY + py)/2);

        ctxC.strokeStyle = '#5856D6';
        ctxC.beginPath(); ctxC.moveTo(centerX, centerY); ctxC.lineTo(px, py); ctxC.stroke();
        ctxC.save();
        ctxC.translate((centerX + px)/2, (centerY + py)/2);
        let textRotation = -mathAngle;
        if (mathAngle > Math.PI / 2 && mathAngle < 3 * Math.PI / 2) textRotation += Math.PI;
        ctxC.rotate(textRotation);
        ctxC.fillStyle = '#5856D6';
        ctxC.textAlign = "center";
        ctxC.fillText("斜邊", 0, (mathAngle > Math.PI / 2 && mathAngle < 3 * Math.PI / 2) ? 15 : -10);
        ctxC.restore();

        ctxC.fillStyle = '#333';
        ctxC.beginPath(); ctxC.arc(px, py, 6, 0, Math.PI * 2); ctxC.fill();
        
        // P 點的向量延伸法定位
        const pLabelDist = radius + 25;
        const plx = centerX + Math.cos(mathAngle) * pLabelDist;
        const ply = centerY - Math.sin(mathAngle) * pLabelDist;
        
        ctxC.font = "bold 16px Arial";
        if (Math.cos(mathAngle) > 0.1) ctxC.textAlign = "left";
        else if (Math.cos(mathAngle) < -0.1) ctxC.textAlign = "right";
        else ctxC.textAlign = "center";
        if (Math.sin(mathAngle) > 0.1) ctxC.textBaseline = "bottom";
        else if (Math.sin(mathAngle) < -0.1) ctxC.textBaseline = "top";
        else ctxC.textBaseline = "middle";
        ctxC.fillText("P", plx, ply);
    }

    function drawPeriodGraph() {
        const margin = 50, gW = 550, gH = 450, gCenterY = 225;
        const graphWidth = gW - margin - 40;
        const scale = radius; 

        ctxG.save();
        ctxG.setLineDash([5, 5]);
        ctxG.strokeStyle = '#d1d1d6';
        ctxG.beginPath(); ctxG.moveTo(margin, gCenterY - scale); ctxG.lineTo(gW - 20, gCenterY - scale); ctxG.stroke();
        ctxG.beginPath(); ctxG.moveTo(margin, gCenterY + scale); ctxG.lineTo(gW - 20, gCenterY + scale); ctxG.stroke();
        ctxG.restore();

        ctxG.fillStyle = '#8e8e93';
        ctxG.font = "12px Arial";
        ctxG.textAlign = "right";
        ctxG.fillText("1", margin - 10, gCenterY - scale + 5);
        ctxG.fillText("-1", margin - 10, gCenterY + scale + 5);

        ctxG.strokeStyle = '#bbb';
        ctxG.setLineDash([]);
        ctxG.beginPath();
        ctxG.moveTo(margin, gCenterY); ctxG.lineTo(gW - 20, gCenterY);
        ctxG.moveTo(margin, 20); ctxG.lineTo(margin, gH - 20);
        ctxG.stroke();

        const labels = [
            { r: 0, t: '0' }, { r: 0.25, t: 'π/2' }, { r: 0.5, t: 'π' }, 
            { r: 0.75, t: '3π/2' }, { r: 1.0, t: '2π' }
        ];
        ctxG.fillStyle = '#666';
        ctxG.font = "16px serif";
        ctxG.textAlign = "center";
        labels.forEach(l => {
            const lx = margin + l.r * graphWidth;
            ctxG.fillText(l.t, lx, gCenterY + 35);
            ctxG.beginPath(); ctxG.moveTo(lx, gCenterY - 5); ctxG.lineTo(lx, gCenterY + 5); ctxG.stroke();
        });

        const funcs = [
            { id: 'sin', formula: Math.sin, color: '#007AFF' },
            { id: 'cos', formula: Math.cos, color: '#FF3B30' },
            { id: 'tan', formula: Math.tan, color: '#AF52DE' }
        ];

        funcs.forEach(f => {
            const isActive = (mode === f.id);
            ctxG.strokeStyle = isActive ? f.color : '#E5E5EA';
            ctxG.lineWidth = isActive ? 3 : 1;
            ctxG.beginPath();
            let first = true;
            for (let x = 0; x <= graphWidth; x++) {
                let t = (x / graphWidth) * Math.PI * 2;
                let val = f.formula(t);
                if (f.id === 'tan' && Math.abs(val) > 8) { first = true; continue; }
                let dx = margin + x, dy = gCenterY - (val * scale);
                if (first) { ctxG.moveTo(dx, dy); first = false; }
                else { ctxG.lineTo(dx, dy); }
            }
            ctxG.stroke();

            if (isActive) {
                let currentPointX = margin + (mathAngle / (Math.PI * 2)) * graphWidth;
                let currentPointY = gCenterY - (f.formula(mathAngle) * scale);
                ctxG.fillStyle = f.color;
                ctxG.beginPath();
                ctxG.arc(currentPointX, currentPointY, 7, 0, Math.PI * 2);
                ctxG.fill();
            }
        });
    }

    function updateDisplayValues() {
        const degStr = (mathAngle * 180 / Math.PI).toFixed(1);
        const preciseRad = parseFloat(degStr) * Math.PI / 180;
        
        const s = Math.sin(preciseRad);
        const c = Math.cos(preciseRad);
        const t = Math.abs(c) < 0.001 ? "±∞" : Math.tan(preciseRad).toFixed(3);

        if (document.activeElement !== degInput) {
            degInput.value = degStr;
        }
        
        document.getElementById('valSin').innerText = s.toFixed(3);
        document.getElementById('valCos').innerText = c.toFixed(3);
        document.getElementById('valTan').innerText = t;
    }

    init();
</script>
</body>
</html>
